name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate

      - name: Run ESLint
        working-directory: backend
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate

      - name: Run tests
        working-directory: backend
        run: bun run test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t prediction-market-backend ./backend

      - name: Build frontend image
        run: docker build -t prediction-market-frontend ./frontend
