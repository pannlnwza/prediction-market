services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - prediction-market
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - market-service
      - order-service
      - wallet-service
      - resolution-service
      - notification-service
      - frontend
    networks:
      - prediction-market

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - prediction-market

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/auth/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      RUN_MIGRATIONS: "true"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

  market-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/market/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      WALLET_SERVICE_URL: http://wallet-service:3003
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

  order-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/order/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      WALLET_SERVICE_URL: http://wallet-service:3003
      MARKET_SERVICE_URL: http://market-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

  wallet-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/wallet/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

  resolution-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/resolution/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      WALLET_SERVICE_URL: http://wallet-service:3003
      MARKET_SERVICE_URL: http://market-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run src/services/notification/index.ts
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prediction-market

volumes:
  pgdata:

networks:
  prediction-market:
    driver: bridge
